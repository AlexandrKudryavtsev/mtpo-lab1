sonar.projectKey=university-admission-app
sonar.projectName=University Admission App
sonar.projectVersion=1.0

# Путь к исходникам
sonar.sources=src
sonar.exclusions=**/__tests__/**,**/*.test.js,**/features/**,**/node_modules/**,**/coverage/**

# Путь к тестам
sonar.tests=src/algorithms/__tests__,src/io/__tests__,src/models/__tests__,src/utils/__tests__,features

# Путь к отчету о покрытии
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.javascript.file.suffixes=.js
sonar.sourceEncoding=UTF-8